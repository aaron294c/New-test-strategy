name: Telegram Daily Snapshots

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Snapshot type to send'
        required: false
        default: 'all'
        type: choice
        options: [all, macro, mr, momentum, divergence, cov]
  schedule:
    # UK times (BST = UTC+1 in summer, GMT = UTC+0 in winter)
    # These are BST times (Mar–Oct).  Adjust by +1h for GMT (Nov–Feb).
    - cron: "0 7 * * 1-5"    # 08:00 UK BST — pre-market macro sweep
    - cron: "30 13 * * 1-5"  # 14:30 UK BST — midday update
    - cron: "30 17 * * 1-5"  # 18:30 UK BST — post-US-close summary

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Send Telegram snapshots
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
        run: |
          TYPE="${{ github.event.inputs.type || 'all' }}"
          python scripts/send_telegram_snapshots.py --type "$TYPE"
